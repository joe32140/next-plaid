name: maxsim-bench

# Cross-platform MaxSim latency at two altitudes, through the production
# scoring paths. Shared-VM numbers — ratios are the signal, absolutes are not.
#
# 1. stage2 phase profile (real shapes): synthetic token values with the REAL
#    per-doc/query token-length distributions of nfcorpus / scifact / fiqa
#    (lens manifests committed under next-plaid/examples/shapes — latency
#    depends on shapes, not values). Corpus-size ladder: nfcorpus 863k tokens,
#    scifact 1.19M, fiqa capped at 15k docs ≈ 2.0M. Indexes are built ONCE in
#    a dedicated ubuntu job (16 GB — a scifact-scale k-means build peaks well
#    beyond the 7 GB macOS runners), cached across runs with actions/cache,
#    and shared to all platforms as an artifact; profile jobs only mmap them.
#    The on-disk format is little-endian npy, portable across all three
#    architectures, and the deterministic LCG queries are identical
#    everywhere, so shortlist fingerprints must match across platforms.
#    Each profile row reports prep | exact MaxSim | end-to-end search_one_mmap
#    (whole pipeline through the public API), float split into
#    decompress + GEMM.
#
# 2. maxsim_bench: mixedbread protocol (fixed candidate list, one query,
#    median of 9 after 2 warmups), synthetic 180/786-token docs, against both
#    the default matrixmultiply float baseline and a vendor-BLAS build
#    (Accelerate/AMX on macOS, OpenBLAS on Linux) — the baseline mixedbread's
#    Float/Float row effectively uses.
#
# Binary has fused SIMD on all three platforms (VNNI/AVX2-SAD on x86, SDOT on
# aarch64); asym-LUT runs tbl+SDOT on aarch64 and pshufb+maddubs AVX2 on x86.
# The test step runs the kernels' bit-exactness parity suite first, so a
# bench row can never come from a kernel that diverges from the scalar
# reference.

on:
  push:
    branches: [feat/asymmetric-lut-residual]
  workflow_dispatch:

# The fiqa corpus-size ladder (4k / 15k / 52k docs ≈ 0.54M / 2.0M / 7.0M
# tokens, one length distribution) exists to show the other side of the
# story: stage-1 grows with corpus while stage-2 stays ~1024 candidate docs,
# so binary's end-to-end advantage must shrink as the corpus grows — the
# honest counterweight to kernel-level speedup headlines. Ladder rungs build
# only r4 + binary (INDEX_TAGS): asym profiles ride the r4 index, and r2/r1
# don't inform this axis.
#
# Builds run as ONE JOB PER CELL: k-means assignment is O(tokens×centroids)
# and centroid count grows with corpus, so build time scales ~n^1.5 — the
# tall rungs need their own timeout budget, their own cache save (a
# cancelled monolithic job saves nothing), and their own right to fail: the
# bench job runs on `!cancelled()` and profiles whatever artifacts exist
# (NO_BUILD degrades missing cells to skips).
jobs:
  build-indexes:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cell: nfcorpus, shapes: nfcorpus, cap: "",      tags: "",          timeout: 45 }
          - { cell: scifact,  shapes: scifact,  cap: "",      tags: "",          timeout: 45 }
          - { cell: fiqa15k,  shapes: fiqa,     cap: "15000", tags: "",          timeout: 120 }
          - { cell: fiqa4k,   shapes: fiqa,     cap: "4000",  tags: "r4,binary", timeout: 45 }
          # The 52k builds peak at 15.7 GB on a 16 GB runner — zero margin,
          # and a runner OOM-death skips even always() steps, losing the
          # cache. So: one JOB per index (independently banked) and halved
          # rayon threads to shrink k-means scratch and buy real headroom.
          - { cell: fiqa52k-r4,  shapes: fiqa,  cap: "52000", tags: "r4",     timeout: 300, threads: 2 }
          - { cell: fiqa52k-bin, shapes: fiqa,  cap: "52000", tags: "binary", timeout: 300, threads: 2 }
    name: build-${{ matrix.cell }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build profiler
        run: cargo build --release --example stage2_profile -p next-plaid
      # Cache key = cell + shapes manifest hash + format version (bump v1
      # manually if the index on-disk format or build config changes). On a
      # hit the profiler sees the completion markers and exits in seconds.
      # restore/save are split so partial progress is banked even when a
      # later build in the leg OOMs (a plain actions/cache skips its save on
      # job failure — that cost us a 33-minute fiqa52k r4 build once).
      - name: restore index cache
        id: idxcache
        uses: actions/cache/restore@v4
        with:
          path: indexes
          key: stage2-idx-v1-${{ matrix.cell }}-${{ hashFiles(format('next-plaid/examples/shapes/{0}/*', matrix.shapes)) }}
      # One PROCESS per index: the fiqa52k r4 build fit in 16 GB, but the
      # binary build that followed it in the same address space OOM'd —
      # allocator state from build N raises build N+1's floor. A fresh
      # process per tag resets it (corpus regen costs ~1-4 s). Also gives
      # per-index peak-RSS from /usr/bin/time -v.
      - name: build (${{ matrix.cell }})
        run: |
          if [ -n "${{ matrix.threads }}" ]; then export RAYON_NUM_THREADS=${{ matrix.threads }}; fi
          TAGS="${{ matrix.tags }}"
          for t in $(echo "${TAGS:-r4,r2,r1,binary}" | tr ',' ' '); do
            BUILD_ONLY=1 INDEX_TAGS=$t INDEX_ROOT=indexes /usr/bin/time -v \
              ./target/release/examples/stage2_profile shapes next-plaid/examples/shapes/${{ matrix.shapes }} ${{ matrix.cap }}
          done
      - name: save index cache
        if: always() && steps.idxcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: indexes
          key: stage2-idx-v1-${{ matrix.cell }}-${{ hashFiles(format('next-plaid/examples/shapes/{0}/*', matrix.shapes)) }}
      - name: index sizes
        run: du -sh indexes/*
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage2-indexes-${{ matrix.cell }}
          path: indexes
          retention-days: 3

  bench:
    needs: build-indexes
    # Run even when a build leg failed or timed out: profile whatever cells
    # made it into artifacts, skip the rest (NO_BUILD).
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release --example maxsim_bench --example stage2_profile -p next-plaid
      - name: kernel parity tests (bit-exact vs scalar reference)
        run: |
          cargo test --release -p next-plaid --lib residual_lut
          cargo test --release -p next-plaid --test residual_lut_integration

      # Cell index dirs are uniquely named (shapes-<dataset>-<n>docs_<tag>),
      # so all per-cell artifacts merge into one flat INDEX_ROOT.
      - uses: actions/download-artifact@v4
        with:
          pattern: stage2-indexes-*
          path: indexes
          merge-multiple: true
      - name: stage2 phase profile — nfcorpus shapes (3,633 docs / 863k tokens)
        run: NO_BUILD=1 INDEX_ROOT=indexes ./target/release/examples/stage2_profile shapes next-plaid/examples/shapes/nfcorpus
      - name: stage2 phase profile — scifact shapes (5,183 docs / 1.19M tokens)
        run: NO_BUILD=1 INDEX_ROOT=indexes ./target/release/examples/stage2_profile shapes next-plaid/examples/shapes/scifact
      - name: stage2 phase profile — fiqa shapes (15k docs / ~2.0M tokens)
        run: NO_BUILD=1 INDEX_ROOT=indexes ./target/release/examples/stage2_profile shapes next-plaid/examples/shapes/fiqa 15000
      - name: corpus ladder — fiqa 4k docs (~0.54M tokens)
        run: NO_BUILD=1 INDEX_TAGS=r4,binary INDEX_ROOT=indexes ./target/release/examples/stage2_profile shapes next-plaid/examples/shapes/fiqa 4000
      - name: corpus ladder — fiqa 52k docs (~7.0M tokens)
        run: NO_BUILD=1 INDEX_TAGS=r4,binary INDEX_ROOT=indexes ./target/release/examples/stage2_profile shapes next-plaid/examples/shapes/fiqa 52000

      - name: bench (synthetic 500 docs x 180 tokens, dim 128)
        run: ./target/release/examples/maxsim_bench synth 500
      - name: bench (synthetic 500 docs x 786 tokens — mixedbread's doc shape)
        run: SYNTH_TOKENS=786 ./target/release/examples/maxsim_bench synth 500
      # Same benches against a vendor-BLAS float baseline (Accelerate/AMX on
      # macOS, OpenBLAS on Linux) instead of default matrixmultiply — measures
      # how much of the binary/LUT speedup survives a peak-strength GEMM, the
      # baseline mixedbread's Float/Float row effectively uses.
      - name: install OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev
      - name: rebuild with vendor BLAS
        env:
          FEAT: ${{ runner.os == 'macOS' && 'accelerate' || 'openblas' }}
        run: cargo build --release --example maxsim_bench -p next-plaid --features "$FEAT"
      # OPENBLAS_NUM_THREADS=1: one BLAS thread per rayon worker — otherwise
      # OpenBLAS's own pool oversubscribes against rayon and the float
      # baseline reads slower than it is (measured: 49 vs 33 ms at 786).
      - name: bench BLAS (500 docs x 180 tokens)
        env:
          OPENBLAS_NUM_THREADS: 1
        run: ./target/release/examples/maxsim_bench synth 500
      - name: bench BLAS (500 docs x 786 tokens)
        env:
          OPENBLAS_NUM_THREADS: 1
        run: SYNTH_TOKENS=786 ./target/release/examples/maxsim_bench synth 500
